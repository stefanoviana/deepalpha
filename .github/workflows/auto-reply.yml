name: Auto Reply to Issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  auto-reply:
    runs-on: ubuntu-latest
    steps:
      - name: Auto Reply
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            Thanks for opening an issue! 👋

            **Quick answers:**

            🔧 **Setup problems?** Make sure you have Python 3.10+, then:
            ```
            pip install -r requirements.txt
            cp .env.example .env
            # Edit .env with your Hyperliquid private key
            python download_data.py
            python train.py
            python deepalpha.py
            ```

            📊 **Model accuracy?** Typical accuracy is 58-62% with walk-forward validation. If you're seeing lower, try downloading fresh data with `python download_data.py`.

            🔑 **Need a Hyperliquid key?** Create a wallet on [app.hyperliquid.xyz](https://app.hyperliquid.xyz), export the private key.

            ⚡ **Want more strategies?** [DeepAlpha Pro](https://stefanocrypto.gumroad.com/l/ezilv) includes 5 strategies, XGBoost ensemble, 38 features, ATR trailing stops, and priority support.

            💬 **Direct support?** Reach out on Telegram: [@stefanoviana_dev](https://t.me/stefanoviana_dev)

            We'll review your issue as soon as possible!
