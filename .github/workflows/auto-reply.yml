name: Auto Reply to Issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  auto-reply:
    runs-on: ubuntu-latest
    steps:
      - name: Auto Reply
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            Thanks for opening an issue!

            **Quick setup:**
            ```
            pip install -r requirements.txt
            cp .env.example .env
            python deepalpha.py
            ```

            **Need help?** Join our [Discord](https://discord.gg/P4yX686m) or check the [Dashboard](https://deepalphabot.com/cloud).

            **Want Pro features?** [DeepAlpha Pro](https://deepalphabot.com/cloud) includes 72 features, ensemble models, cloud dashboard, and priority support.

            We'll review your issue soon!
