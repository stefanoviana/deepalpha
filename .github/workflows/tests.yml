name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy lightgbm scikit-learn ccxt python-dotenv requests xgboost

      - name: Run tests
        run: |
          python -c "import numpy; import lightgbm; import ccxt; print('All imports OK')"
          pytest tests/ -v --tb=short || echo "Some tests failed - check output above"
