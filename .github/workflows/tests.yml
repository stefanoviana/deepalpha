name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install numpy lightgbm scikit-learn ccxt python-dotenv requests xgboost
      - name: Verify imports
        run: |
          python -c "
          import numpy as np
          import lightgbm
          import sklearn
          import ccxt
          print('All core imports OK')
          print(f'NumPy {np.__version__}')
          print(f'LightGBM {lightgbm.__version__}')
          print(f'scikit-learn {sklearn.__version__}')
          print(f'ccxt {ccxt.__version__}')
          "
      - name: Check model files exist
        run: |
          ls -la *.py | head -20
          echo "Repository structure OK"
